# Pure new RBAC scopes for registry server/agent/federation APIs.
# Scopes configuration for role-based permissions focused on first-class resource APIs.
#
# Federation authorization uses a two-layer model:
# - scopes control access to federation-related endpoints
# - ACL controls access to a specific federation resource
# Therefore `federations-read` / `federations-write` do not replace resource ACL;
# they work together with the generic `/permissions/{resource_type}/{resource_id}` APIs.
#
# Roles:
# - registry-admin: full access
# - registry-power-user: create/update/delete federation/server/agent resources and manage ACL
# - register-user: create/update/delete federation/server/agent resources, but not share them
# - register-read-only: read-only access to federation/server/agent resources

group_mappings:
  jarvis-registry-admin:
    - servers-read
    - agents-read
    - agents-write
    - server-write
    - federations-read
    - federations-write
    - federations-share
    - servers-share
    - agents-share
    - system-ops
    - user-read
    - acl-read
    - acl-write
    - mcp-proxy-ops
  jarvis-registry-power-user:
    - servers-read
    - agents-read
    - agents-write
    - server-write
    - federations-read
    - federations-write
    - federations-share
    - servers-share
    - agents-share
    - user-read
    - acl-read
    - acl-write
    - mcp-proxy-ops
  jarvis-registry-user:
    - servers-read
    - agents-read
    - agents-write
    - server-write
    - federations-read
    - federations-write
    - user-read
    - acl-read
    - mcp-proxy-ops
  jarvis-registry-read-only:
    - servers-read
    - agents-read
    - federations-read
    - user-read
    - acl-read

servers-read:
  - action: list_servers
    method: GET
    endpoint: /servers
  - action: get_server
    method: GET
    endpoint: /servers/{server_id}
  - action: servers_connection
    method: POST
    endpoint: /servers/connection
  - action: get_server_tools
    method: GET
    endpoint: /servers/{server_id}/tools
  - action: refresh_server_health
    method: POST
    endpoint: /servers/{server_id}/refresh

agents-read:
  - action: list_agents
    method: GET
    endpoint: /agents
  - action: get_agent
    method: GET
    endpoint: /agents/{agent_id}
  - action: get_agent_skills
    method: GET
    endpoint: /agents/{agent_id}/skills
  - action: get_agent_rating
    method: GET
    endpoint: /agents/{agent_id}/rating
  - action: discover_agents
    method: POST
    endpoint: /agents/discover
  - action: discover_agents_semantic
    method: POST
    endpoint: /agents/discover/semantic
  - action: check_agent_health
    method: POST
    endpoint: /agents/{agent_id}/health
  - action: get_agent_wellknown_card
    method: GET
    endpoint: /agents/.well-known/agent-cards

agents-write:
  - action: create_agent
    method: POST
    endpoint: /agents
  - action: modify_agent
    method: PATCH
    endpoint: /agents/{agent_id}
  - action: delete_agent
    method: DELETE
    endpoint: /agents/{agent_id}
  - action: toggle_agent
    method: POST
    endpoint: /agents/{agent_id}/toggle
  - action: sync_wellknown
    method: POST
    endpoint: /agents/{agent_id}/wellknown

server-write:
  - action: register_service
    method: POST
    endpoint: /servers
  - action: modify_service
    method: PATCH
    endpoint: /servers/{server_id}
  - action: delete_service
    method: DELETE
    endpoint: /servers/{server_id}
  - action: toggle_service
    method: POST
    endpoint: /servers/{server_id}/toggle

federations-read:
  # Federation read scopes only allow access to federation read endpoints.
  # Resource-level visibility is still filtered by ACL at runtime.
  - action: list_federations
    method: GET
    endpoint: /federations
  - action: get_federation
    method: GET
    endpoint: /federations/{federation_id}

federations-write:
  # Federation write scopes allow create/update/sync/delete endpoints.
  # Update/sync/delete still require resource-level ACL permissions such as EDIT/DELETE.
  - action: create_federation
    method: POST
    endpoint: /federations
  - action: update_federation
    method: PUT
    endpoint: /federations/{federation_id}
  - action: delete_federation
    method: DELETE
    endpoint: /federations/{federation_id}
  - action: sync_federation
    method: POST
    endpoint: /federations/{federation_id}/sync

federations-share:
  # Federation share only manages ACL on the federation resource itself.
  # It does not cascade to synced MCP servers or A2A agents under that federation.
  # Child resources remain independently shareable through `servers-share` and `agents-share`.
  - action: share_federation
    method: PUT
    endpoint: /permissions/federation/{resource_id}

servers-share:
  # MCP servers stay independently shareable even when they were created by federation sync.
  # Sharing a federation does not imply sharing any `/permissions/mcpServer/{resource_id}` ACL.
  - action: share_service
    method: PUT
    endpoint: /permissions/mcpServer/{resource_id}

agents-share:
  # A2A agents stay independently shareable even when they were created by federation sync.
  # Sharing a federation does not imply sharing any `/permissions/agent/{resource_id}` ACL.
  - action: share_agent
    method: PUT
    endpoint: /permissions/agent/{resource_id}

user-read:
  - action: get_user_info
    method: GET
    endpoint: /auth/me
  - action: get_version
    method: GET
    endpoint: /version
  # Token management
  - action: generate_user_token
    method: POST
    endpoint: /tokens/generate
  # Search functionality
  - action: search
    method: POST
    endpoint: /search/semantic
  - action: search_servers
    method: POST
    endpoint: /search/servers
  # MCP connection management
  - action: reinitialize_server
    method: POST
    endpoint: /mcp/{server_id}/reinitialize
  - action: get_connection_status
    method: GET
    endpoint: /mcp/connection/status
  - action: get_server_connection_status
    method: GET
    endpoint: /mcp/connection/status/{server_id}
  - action: get_auth_values
    method: GET
    endpoint: /mcp/{server_name}/auth-values
  # MCP OAuth management
  - action: oauth_discover
    method: GET
    endpoint: /mcp/oauth/discover
  - action: oauth_initiate
    method: GET
    endpoint: /mcp/{server_id}/oauth/initiate
  - action: oauth_callback
    method: GET
    endpoint: /mcp/{server_path}/oauth/callback
  - action: get_oauth_tokens
    method: GET
    endpoint: /mcp/oauth/tokens/{flow_id}
  - action: get_oauth_status
    method: GET
    endpoint: /mcp/oauth/status/{flow_id}
  - action: cancel_oauth
    method: POST
    endpoint: /mcp/oauth/cancel/{server_id}
  - action: refresh_oauth_token
    method: POST
    endpoint: /mcp/oauth/refresh/{server_id}
  - action: delete_oauth_token
    method: DELETE
    endpoint: /mcp/oauth/token/{server_id}

acl-read:
  # Generic ACL read APIs are also used for federation resources via resource_type=federation.
  - action: search_principals
    method: GET
    endpoint: /permissions/search-principals
  - action: get_resource_permissions
    method: GET
    endpoint: /permissions/{resource_type}/{resource_id}

acl-write:
  # Generic ACL write APIs are also used for federation resources via resource_type=federation.
  - action: update_resource_permissions
    method: PUT
    endpoint: /permissions/{resource_type}/{resource_id}

system-ops:
  - action: get_server_stats
    method: GET
    endpoint: /servers/stats
  - action: get_admin_tokens
    method: GET
    endpoint: /admin/tokens
  - action: sync_agentcore_runtime
    method: POST
    endpoint: /federation/agentcore/runtime/sync

mcp-proxy-ops:
  - action: delete_session
    method: DELETE
    endpoint: /proxy/sessions/{server_id}
  - action: connection_mcp
    method: GET,POST
    endpoint: /proxy/mcpgw/mcp
