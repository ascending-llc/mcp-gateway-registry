[tool.tartufo]
repo-path = '.'
regex = true
entropy = true

exclude-path-patterns = [
    {path-pattern = 'uv\.lock$', reason = 'uv lock file'},
    {path-pattern = '.*package-lock\.json$', reason = 'npm lock file'},
    {path-pattern = 'tartufo\.toml$', reason = 'Tartufo config file'},
]

exclude-entropy-patterns = [
    # {path-pattern = '', pattern = '', reason = ''},
]

